# VLM Model Configurations
# Origin: chinese (Qwen) / western (LLaMA, GPT, Gemini, Claude)
# Type: open-source (local inference) / proprietary (API)
# All open-source models fit on a single H100 GPU (80GB)

models:
  # Chinese-origin Open-source Models
  qwen2.5-vl-7b:
    name: "Qwen2.5-VL-7B-Instruct"
    origin: "chinese"
    type: "open-source"
    model_path_or_id: "Qwen/Qwen2.5-VL-7B-Instruct"
    size: "7B"
    max_tokens: 4096
    gpu_required: 1
    tensor_parallel: false

  qwen2-vl-7b:
    name: "Qwen2-VL-7B-Instruct"
    origin: "chinese"
    type: "open-source"
    model_path_or_id: "Qwen/Qwen2-VL-7B-Instruct"
    size: "7B"
    max_tokens: 4096
    gpu_required: 1
    tensor_parallel: false

  # Western-origin Open-source Models
  llama-3.2-vision-11b:
    name: "LLaMA-3.2-Vision-11B"
    origin: "western"
    type: "open-source"
    model_path_or_id: "meta-llama/Llama-3.2-11B-Vision-Instruct"
    size: "11B"
    max_tokens: 4096
    gpu_required: 1
    tensor_parallel: false

  # Western-origin Proprietary Models (API)
  gpt-4o-mini:
    name: "GPT-4o-mini"
    origin: "western"
    type: "proprietary"
    model_path_or_id: "gpt-4o-mini"
    size: "unknown"
    max_tokens: 4096
    api_provider: "openai"
    rate_limit_rpm: 500
    cost_per_1k_input: 0.00015
    cost_per_1k_output: 0.0006

  gemini-2.5-flash:
    name: "Gemini-2.5-Flash"
    origin: "western"
    type: "proprietary"
    model_path_or_id: "gemini-2.5-flash-preview-05-20"
    size: "unknown"
    max_tokens: 4096
    api_provider: "google"
    rate_limit_rpm: 1000
    cost_per_1k_input: 0.00015
    cost_per_1k_output: 0.0006

  claude-haiku-4.5:
    name: "Claude-Haiku-4.5"
    origin: "western"
    type: "proprietary"
    model_path_or_id: "claude-haiku-4-5-20251001"
    size: "unknown"
    max_tokens: 4096
    api_provider: "anthropic"
    rate_limit_rpm: 50
    cost_per_1k_input: 0.0008
    cost_per_1k_output: 0.004

# Model groupings for analysis
model_groups:
  by_origin:
    chinese: ["qwen2.5-vl-7b", "qwen2-vl-7b"]
    western: ["llama-3.2-vision-11b", "gpt-4o-mini", "gemini-2.5-flash", "claude-haiku-4.5"]

  by_type:
    open_source: ["qwen2.5-vl-7b", "qwen2-vl-7b", "llama-3.2-vision-11b"]
    proprietary: ["gpt-4o-mini", "gemini-2.5-flash", "claude-haiku-4.5"]
