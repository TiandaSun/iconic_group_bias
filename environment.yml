name: vlm_eval
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch>=2.0.0
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1
  - pip
  - pip:
    # Transformers & Model Loading
    - transformers>=4.40.0
    - accelerate>=0.25.0
    - sentencepiece
    - protobuf

    # API Clients
    - openai>=1.0.0
    - anthropic>=0.25.0
    - google-generativeai>=0.5.0

    # Data Processing
    - pandas>=2.0.0
    - numpy>=1.24.0
    - openpyxl>=3.1.0
    - Pillow>=10.0.0

    # Machine Learning & Evaluation
    - scikit-learn>=1.3.0
    - scipy>=1.10.0

    # Visualization
    - matplotlib>=3.7.0
    - seaborn>=0.12.0

    # Configuration & Utilities
    - pyyaml>=6.0
    - tqdm>=4.65.0

    # Testing
    - pytest>=7.0.0
    - pytest-cov>=4.0.0
